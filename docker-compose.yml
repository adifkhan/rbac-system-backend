version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: permission_system_db
    environment:
      POSTGRES_DB: permission_system
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: